<style>

  ::-webkit-scrollbar-track{background:#F3EFE9}
  ::-webkit-scrollbar-thumb{background:#D4A373;border-radius:2px}
  .font-display{font-family:'Lora',Georgia,serif}
  .font-mono{font-family:'Courier New',monospace}
  .overline{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#5C6661}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
  .fade-in{animation:fadeIn .3s ease both}
  .breathe{animation:breathe 2s ease-in-out infinite}
  .spin{animation:spin .9s linear infinite;display:inline-block}

  /* cards */
  .card{background:#fff;border:1px solid #E2DDD7;border-radius:16px;padding:24px}
  .card-green{background:#1C3F39;border:1px solid #1C3F39;border-radius:16px;padding:24px;color:#F9F9F6}

  .badge-in_progress{background:rgba(181,91,73,.2);color:#9B2226}
  .badge-completed{background:rgba(45,106,79,.2);color:#2D6A4F}

  .badge-dispensed{background:#2D6A4F;color:#F9F9F6}
  .badge-paid{background:rgba(45,106,79,.2);color:#2D6A4F}
  .badge-unpaid{background:rgba(92,102,97,.12);color:#5C6661}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:10px 8px;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#5C6661;border-bottom:1px solid #E2DDD7}
  td{padding:12px 8px;border-bottom:1px solid rgba(226,221,215,.6);vertical-align:top}
  tr:hover td{background:#F9F9F6}
  tr:last-child td{border-bottom:none}

  /* input */
  input,textarea,select{width:100%;padding:8px 12px;border:1px solid #E2DDD7;border-radius:8px;font-size:13px;background:#fff;color:#0A0F0D;outline:none;font-family:inherit}
  input:focus,textarea:focus,select:focus{border-color:#1C3F39}
  label{font-size:11px;font-weight:600;color:#5C6661;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}

  /* grid */
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .col-span-2{grid-column:span 2}
  .col-span-3{grid-column:span 3}

  /* sync dot */
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#2D6A4F;display:inline-block}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:#F9F9F6;border:1px solid #E2DDD7;border-radius:20px;width:100%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
  .modal-header{padding:22px 24px 16px;border-bottom:1px solid #E2DDD7}
  .modal-body{padding:20px 24px;overflow-y:auto;flex:1}

</style>

/* ââ Login âââââââââââââââââââââââââââââââââââââââââââââââââ */
function Login({ onLogin }) {

                transition:'all .15s',

/* ââ Patient Detail Modal ââââââââââââââââââââââââââââââââââ */

          <div style={{ display:'flex', gap:4, marginTop:14 }}>
            {['summary','vitals','prescriptions'].map(t => (
              <button key={t} onClick={() => setTab(t)} style={{
                padding:'5px 14px', borderRadius:'8px 8px 0 0', fontSize:12, fontWeight:600, cursor:'pointer',

                    <td>{low ? <span className="badge" style={{ background:'rgba(155,34,38,.1)', color:'#9B2226' }}>LOW</span>
                           : expSoon ? <span className="badge" style={{ background:'rgba(181,91,73,.12)', color:terra }}>EXPIRING</span>
                           : <span className="badge badge-completed">OK</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </AppShell>
  );

  return (
    <AppShell title="Pharmacy Â· Dispense Queue" subtitle="Pharmacy" tab={tab} setTab={setTab}
      tabs={['Dispense','Inventory']}>

      {/* Confirm modal */}
      {confirm && (
        <div className="modal-overlay">
          <div className="modal fade-in" style={{ maxWidth:460 }}>
            <div className="modal-header">
              <h3 className="font-display" style={{ fontSize:'1.3rem', fontWeight:700 }}>Confirm dispense?</h3>
              <p style={{ fontSize:13, color:muted, marginTop:4 }}>{confirm.patient.name} Â· #{confirm.queue_number}</p>
            </div>
            <div className="modal-body">
              <div className="overline" style={{ marginBottom:10 }}>Medicines to hand over</div>
              {confirm.prescriptions.map((p, i) => (

                  <span style={{ fontSize:16 }}>ð</span>
                  <div style={{ fontSize:13 }}><b>{p.medicine}</b>
                    <span className="font-mono" style={{ color:muted, fontSize:11, display:'block', marginTop:2 }}>
                      {p.dosage} Â· {p.frequency} Â· {p.duration}
                    </span>
                  </div>
                </div>
              ))}
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setConfirm(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={()=>doDispense(confirm)}>â Confirm & complete</button>
            </div>
          </div>
        </div>
      )}

      <div className="grid3">
        {/* Waiting count */}
        <div className="card-green">
          <div className="overline" style={{ color:'rgba(249,249,246,.6)' }}>Waiting</div>
          <div className="font-mono font-display" style={{ fontSize:'4.5rem', fontWeight:700, lineHeight:1, marginTop:8 }}>
            {pending.length}
          </div>
          <div style={{ fontSize:13, color:'rgba(249,249,246,.7)', marginTop:10 }}>
            patient(s) ready to collect
          </div>
        </div>

        {/* How it works */}
        <div className="card col-span-2" style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ width:52, height:52, borderRadius:14, background:beige, flexShrink:0,
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:24 }}>âï¸</div>
          <div>
            <div className="overline" style={{ marginBottom:4 }}>How it works</div>
            <p style={{ fontSize:13, color:muted, lineHeight:1.6 }}>
              When a patient pays at the kiosk, their prescription arrives here.
              Verify the meds, hand them over, then tap <b style={{ color:text }}>Dispense</b> â the treatment is marked complete.
            </p>
          </div>
        </div>

        {/* Dispense queue */}
        <div className="card col-span-3">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <div>
              <div className="overline">Dispense Queue</div>
              <h3 className="font-display" style={{ fontSize:'1.15rem', fontWeight:700, marginTop:2 }}>
                Live Â· {pending.length} pending
              </h3>
            </div>
            <span style={{ fontSize:18 }}>ð</span>
          </div>

          {pending.length === 0 && (
            <div style={{ border:`1.5px dashed ${border}`, borderRadius:14, padding:32, textAlign:'center', color:muted, fontSize:13 }}>
              No patients waiting. Drink some water ð¿
            </div>
          )}

          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            {pending.map(a => (
              <div key={a.id} style={{ border:`1px solid ${border}`, borderRadius:16, padding:20, background:cream,
                display:'grid', gridTemplateColumns:'auto 1fr auto', gap:16, alignItems:'start' }}>
                <div className="queue-avatar">{`#${a.queue_number}`}</div>
                <div>
                  <h4 className="font-display" style={{ fontSize:'1.1rem', fontWeight:700 }}>{a.patient.name}</h4>
                  <div style={{ fontSize:11, color:muted, fontFamily:'monospace', marginTop:2 }}>{a.patient.ic_number}</div>
                  <div style={{ fontSize:12, color:muted, marginTop:4 }}>
                    Prescribed by {a.doctor.name} Â· paid RM{a.fee}.00
                  </div>
                  {a.diagnosis && (
                    <div style={{ fontSize:13, marginTop:6 }}><span style={{ color:muted }}>Dx: </span>{a.diagnosis}</div>
                  )}
                  {a.prescriptions.length > 0 && (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:8, marginTop:12 }}>
                      {a.prescriptions.map((p, i) => (
                        <div key={i} className="rx-card">
                          <span style={{ fontSize:16 }}>ð</span>
                          <div>
                            <div style={{ fontWeight:600, fontSize:13 }}>{p.medicine}</div>
                            <div style={{ fontSize:11, color:muted, fontFamily:'monospace', marginTop:2 }}>
                              {p.dosage} Â· {p.frequency} Â· {p.duration}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:8, alignItems:'flex-end' }}>
                  <span className="badge badge-paid">paid</span>
                  <button className="btn btn-primary" onClick={()=>setConfirm(a)}>â Dispense</button>
                </div>
              </div>
            ))}
          </div>
        </div>

        <SyncIndicator />
      </div>
    </AppShell>
  );
}

/* ââ Root ââââââââââââââââââââââââââââââââââââââââââââââââââ */
function App() {
  const [role,  setRole]  = useState(null);
  const [queue, setQueue] = useState(QUEUE);

  if (!role) return <Login onLogin={r => setRole(r)} />;

  return (
    <>
      {role.id === 'admin'    && <Reception queue={queue} setQueue={setQueue} />}
      {role.id === 'doctor'   && <Doctor    queue={queue} />}
      {role.id === 'pharmacy' && <Pharmacy  queue={queue} setQueue={setQueue} />}
      {/* Tiny sign-out button */}
      <button onClick={()=>setRole(null)} style={{
        position:'fixed', top:12, right:16, zIndex:200,
        background:'transparent', border:`1px solid ${border}`,
        borderRadius:999, padding:'4px 12px', fontSize:11, color:muted, cursor:'pointer',
      }}>Sign out</button>
    </>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
